<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- Metallic gradients for the headband and earcups -->
    <linearGradient id="metal-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#434343" />
      <stop offset="50%" stop-color="#2c2c2e" />
      <stop offset="100%" stop-color="#0a0a0a" />
    </linearGradient>
    <linearGradient id="silver-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="30%" stop-color="#b0b0b5" />
      <stop offset="70%" stop-color="#48484a" />
      <stop offset="100%" stop-color="#1c1c1e" />
    </linearGradient>
    <linearGradient id="accent-glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d21f3c" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#ff4d6d" stop-opacity="0" />
    </linearGradient>
    <!-- Drop shadows -->
    <filter id="drop-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="25" stdDeviation="30" flood-color="#000" flood-opacity="0.6" />
    </filter>
  </defs>

  <!-- Headphone assembly -->
  <g filter="url(#drop-shadow)">
    <!-- Outer Headband Arch -->
    <path d="M 100 280 C 100 100, 400 100, 400 280" fill="none" stroke="url(#metal-grad)" stroke-width="28" stroke-linecap="round" />
    <path d="M 100 280 C 100 100, 400 100, 400 280" fill="none" stroke="url(#silver-grad)" stroke-width="6" stroke-linecap="round" opacity="0.3" />
    
    <!-- Inner Headband Cushion -->
    <path d="M 115 270 C 115 120, 385 120, 385 270" fill="none" stroke="#1c1c1e" stroke-width="18" stroke-linecap="round" />
    
    <!-- Left Hanger / Extendable Metal Arm -->
    <g transform="translate(90, 260) rotate(-15)">
      <rect x="-8" y="0" width="16" height="50" rx="4" fill="url(#silver-grad)" />
      <circle cx="0" cy="45" r="6" fill="#d21f3c" />
    </g>

    <!-- Right Hanger / Extendable Metal Arm -->
    <g transform="translate(410, 260) rotate(15)">
      <rect x="-8" y="0" width="16" height="50" rx="4" fill="url(#silver-grad)" />
      <circle cx="0" cy="45" r="6" fill="#d21f3c" />
    </g>

    <!-- Left Earcup Outer Shell -->
    <g transform="translate(85, 310) rotate(-15)">
      <!-- Outer Ear Cup Rim -->
      <ellipse cx="0" cy="0" rx="45" ry="65" fill="url(#metal-grad)" stroke="url(#silver-grad)" stroke-width="3" />
      <!-- Middle Grill -->
      <ellipse cx="0" cy="0" rx="35" ry="52" fill="#121212" stroke="#2c2c2e" stroke-width="1.5" />
      <!-- Inner mesh texture / accent circle -->
      <ellipse cx="0" cy="0" rx="25" ry="38" fill="url(#accent-glow)" />
      <!-- Silver logo plate inside left earcup -->
      <ellipse cx="0" cy="0" rx="15" ry="22" fill="url(#silver-grad)" />
      <text x="0" y="5" font-family="'Outfit', sans-serif" font-size="10" font-weight="bold" fill="#0a0a0a" text-anchor="middle">L</text>
    </g>

    <!-- Right Earcup Outer Shell -->
    <g transform="translate(415, 310) rotate(15)">
      <!-- Outer Ear Cup Rim -->
      <ellipse cx="0" cy="0" rx="45" ry="65" fill="url(#metal-grad)" stroke="url(#silver-grad)" stroke-width="3" />
      <!-- Middle Grill -->
      <ellipse cx="0" cy="0" rx="35" ry="52" fill="#121212" stroke="#2c2c2e" stroke-width="1.5" />
      <!-- Inner mesh texture / accent circle -->
      <ellipse cx="0" cy="0" rx="25" ry="38" fill="url(#accent-glow)" />
      <!-- Silver logo plate inside right earcup -->
      <ellipse cx="0" cy="0" rx="15" ry="22" fill="url(#silver-grad)" />
      <text x="0" y="5" font-family="'Outfit', sans-serif" font-size="10" font-weight="bold" fill="#0a0a0a" text-anchor="middle">R</text>
    </g>

    <!-- Left Cushion Cushion Padding -->
    <g transform="translate(100, 315) rotate(-15)">
      <ellipse cx="0" cy="0" rx="28" ry="58" fill="#1c1c1e" opacity="0.95" />
      <ellipse cx="0" cy="0" rx="14" ry="32" fill="#0a0a0a" />
    </g>

    <!-- Right Cushion Cushion Padding -->
    <g transform="translate(400, 315) rotate(15)">
      <ellipse cx="0" cy="0" rx="28" ry="58" fill="#1c1c1e" opacity="0.95" />
      <ellipse cx="0" cy="0" rx="14" ry="32" fill="#0a0a0a" />
    </g>
    
    <!-- Premium glowing wires / accents -->
    <path d="M 85 365 Q 150 430, 250 440 Q 350 430, 415 365" fill="none" stroke="url(#accent-glow)" stroke-width="3" opacity="0.7" />
  </g>
</svg>
